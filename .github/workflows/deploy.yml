name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Required for the deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ───────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # API routes and the admin panel require a live server (Node.js / Vercel).
      # GitHub Pages only serves static files, so we remove them before building.
      # This only modifies the CI runner workspace — your local files are unchanged.
      - name: Remove server-only routes for static export
        run: |
          rm -rf src/app/api src/app/admin
          printf 'import { NextResponse } from "next/server";\nexport function middleware() { return NextResponse.next(); }\nexport const config = { matcher: [] };\n' > src/middleware.ts

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          # Set REPO_NAME as a GitHub Actions variable (Settings → Variables → Actions)
          # if your site lives at  https://<user>.github.io/<repo-name>
          # Leave it unset (or set to "") for  https://<user>.github.io
          REPO_NAME: ${{ vars.REPO_NAME }}

      # Prevents GitHub Pages from trying to process files with Jekyll
      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  # ── 2. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
